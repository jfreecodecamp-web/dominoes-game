<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominoes Jamrock Edition</title>
    <style>
        :root { --rasta-red: #e74c3c; --rasta-gold: #f1c40f; --rasta-green: #27ae60; }
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        #scoreboard {
            position: absolute; bottom: 20px; right: 20px;
            display: none; background: rgba(0,0,0,0.85); padding: 15px;
            border: 3px solid var(--rasta-gold); border-radius: 10px; color: white;
            z-index: 100; font-size: 1.1vw; min-width: 180px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .score-item { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .score-val { color: var(--rasta-gold); font-size: 1.6vw; float: right; margin-left: 10px; }

        #gatekeeper, #difficultyMenu, #mainMenu {
            position: absolute; z-index: 300; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #difficultyMenu, #mainMenu { 
            display: none;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1585909694080-6060c571737e?q=80&w=2000');
            background-size: cover;
        }

        .menu-btn {
            width: 320px; padding: 20px; margin: 15px; font-size: 1.5vw; cursor: pointer;
            border: 4px solid #000; border-radius: 10px; font-weight: bold; color: white;
            transition: transform 0.2s; text-transform: uppercase;
        }

        #enterBtn { background: var(--rasta-gold); color: #000; font-size: 2.5vw; padding: 20px 50px; border-radius: 15px; }
        .easy-btn { background: var(--rasta-green); }
        .hard-btn { background: var(--rasta-gold); color: black; }
        .vhard-btn { background: var(--rasta-red); }
        
        #cutThroatBtn { background: var(--rasta-red); }
        #partnerBtn { background: var(--rasta-green); }

        h1 { color: var(--rasta-gold); font-size: 4vw; text-shadow: 3px 3px 0px var(--rasta-red); text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        h2 { color: white; margin-bottom: 10px; }
        
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; z-index: 10; width: 100%; }
        .msg { color: var(--rasta-gold); font-size: 2.2vw; text-shadow: 2px 2px 4px #000; font-weight: bold; }
        canvas { background: #1b4d3e; border: 1vmin solid #3d2b1f; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); max-width: 98vw; max-height: 90vh; }
        #passBtn { position: absolute; bottom: 12%; padding: 12px 40px; font-size: 1.5vw; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; pointer-events: auto; font-weight: bold; }
    </style>
</head>
<body>

    <div id="scoreboard"></div>

    <div id="gatekeeper">
        <h1 style="color:white; letter-spacing:3px;">JAMROCK DOMINOES</h1>
        <button id="enterBtn" class="menu-btn" onclick="initAudio()">ENTER GAME</button>
    </div>

    <div id="difficultyMenu">
        <h1>Select AI Skill</h1>
        <button class="menu-btn easy-btn" onclick="selectDifficulty('Easy')">Easy (Beginner)</button>
        <button class="menu-btn hard-btn" onclick="selectDifficulty('Hard')">Hard (Competitive)</button>
        <button class="menu-btn vhard-btn" onclick="selectDifficulty('Very Hard')">Very Hard (Master)</button>
    </div>

    <div id="mainMenu">
        <h1>Select Game Mode</h1>
        <button id="cutThroatBtn" class="menu-btn" onclick="startGame('Cut Throat')">Cut Throat</button>
        <button id="partnerBtn" class="menu-btn" onclick="startGame('Partner')">Partner</button>
    </div>

    <div id="ui"><div id="status" class="msg"></div></div>
    <button id="passBtn" onclick="handlePass()">PASS</button>
    <canvas id="gameCanvas"></canvas>

<script>
const jamrockMusic = new Audio("./jamrock.mp3"); 
jamrockMusic.loop = true;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const statusMsg = document.getElementById('status');
const passBtn = document.getElementById('passBtn');
const scoreBoard = document.getElementById('scoreboard');

let audioCtx = null;
let gameMode = "Cut Throat";
let difficulty = "Hard";
let scores = [0, 0, 0, 0];
let passCount = 0;
let shakeAmount = 0;
let isSlamming = false;
let scatterTiles = [];
let slamHand = { x: 0, y: 0, scale: 0, opacity: 0 };
let boardHistory = []; 

// --- NEW RULE VARIABLES ---
let winnerOfPreviousHand = -1; // -1 means first game (Double 6 starts)
let isDoublePointRound = false; 

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume().then(() => {
        jamrockMusic.play().then(() => {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('difficultyMenu').style.display = 'flex';
        }).catch(() => {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('difficultyMenu').style.display = 'flex';
        });
    });
}

function selectDifficulty(level) {
    difficulty = level;
    document.getElementById('difficultyMenu').style.display = 'none';
    document.getElementById('mainMenu').style.display = 'flex';
}

function startGame(mode) {
    gameMode = mode;
    scores = [0, 0, 0, 0];
    winnerOfPreviousHand = -1; // Reset for new session
    isDoublePointRound = false;
    jamrockMusic.pause();
    document.getElementById('mainMenu').style.display = 'none';
    updateScoreboardUI();
    startWash();
}

function triggerShake(amt = 15) { shakeAmount = amt; }

function processWinner(index, message) {
    // Award 2 points if the previous game was a draw, otherwise 1
    const pointsAwarded = isDoublePointRound ? 2 : 1;
    scores[index] += pointsAwarded;
    
    // Reset double point flag after it's been claimed
    isDoublePointRound = false;
    winnerOfPreviousHand = index; // Winner gets the "pose" for next round

    statusMsg.innerText = message;
    isSlamming = true;
    triggerShake(50);
    playClack(); playClack();
    
    scatterTiles = [];
    const allRemaining = [...lineOfPlay];
    players.forEach(hand => allRemaining.push(...hand));
    allRemaining.forEach(t => {
        scatterTiles.push({
            t: t.t, b: t.b, x: canvas.width/2, y: canvas.height/2,
            targetX: Math.random() * canvas.width, targetY: Math.random() * canvas.height,
            angle: Math.random() * 360, hidden: Math.random() > 0.5
        });
    });

    slamHand = { x: canvas.width/2, y: canvas.height/2, scale: 3, opacity: 1 };
    jamrockMusic.currentTime = 0;
    jamrockMusic.play();
    
    setTimeout(() => {
        alert(`${message} \nPoints awarded: ${pointsAwarded}`);
        jamrockMusic.pause(); 
        isSlamming = false;
        resetHand();
    }, 3000);
}

function resetHand() {
    lineOfPlay = [];
    turn = -1;
    passCount = 0;
    boardHistory = [];
    updateScoreboardUI();
    startWash();
}

// --- AI BRAIN LOGIC ---
function getBestMove(hand, L, R, playerIdx) {
    let validMoves = [];
    hand.forEach((t, i) => {
        if (lineOfPlay.length === 0) { 
            // RULE 1: If winnerOfPreviousHand is -1 or it's a double-point round, must play Double 6
            if (winnerOfPreviousHand === -1 || isDoublePointRound) {
                if (t.t === 6 && t.b === 6) validMoves.push({tile: t, index: i, side: 'L'}); 
            } else {
                // Winner can start with any tile
                validMoves.push({tile: t, index: i, side: 'L'});
            }
        }
        else {
            if (t.t === L || t.b === L) validMoves.push({tile: t, index: i, side: 'L'});
            if (t.t === R || t.b === R) validMoves.push({tile: t, index: i, side: 'R'});
        }
    });

    if (validMoves.length === 0) return null;

    if (difficulty === "Easy") return validMoves[Math.floor(Math.random() * validMoves.length)];

    validMoves.forEach(move => {
        let score = 0;
        const t = move.tile;
        score += (t.t + t.b);
        if (t.t === t.b) score += 15;

        if (difficulty === "Very Hard") {
            const myEnd = (move.side === 'L') ? (t.t === L ? t.b : t.t) : (t.t === R ? t.b : t.t);
            if (gameMode === "Partner") {
                let partnerIdx = (playerIdx + 2) % 4;
                if (boardHistory.some(h => h.p === partnerIdx && h.val === myEnd)) score -= 20;
            }
            let opponents = gameMode === "Partner" ? [(playerIdx + 1) % 4, (playerIdx + 3) % 4] : [0, 1, 2, 3].filter(p => p !== playerIdx);
            opponents.forEach(opp => {
                if (boardHistory.some(h => h.p === opp && h.val === myEnd)) score += 25;
            });
        }
        move.score = score;
    });

    validMoves.sort((a, b) => b.score - a.score);
    return validMoves[0];
}

function aiMove() {
    if (turn === 0 || turn === -1 || isSlamming) return;

    const hand = players[turn];
    const L = lineOfPlay[0]?.t;
    const R = lineOfPlay[lineOfPlay.length - 1]?.b;
    
    const thinkingTime = 1500 + Math.random() * 2000;
    
    setTimeout(() => {
        const move = getBestMove(hand, L, R, turn);

        if (move) {
            const tile = hand.splice(move.index, 1)[0];
            tryPlay(tile, move.side === 'L' ? 0 : canvas.width);
            if (!checkWin()) nextTurn();
        } else {
            if (lineOfPlay.length > 0) {
                boardHistory.push({p: turn, val: L}, {p: turn, val: R});
            }
            statusMsg.innerText = `Player ${turn + 1} Passes`;
            speakPass();
            passCount++;
            if (passCount >= 4) handleLockedGame(); else setTimeout(nextTurn, 1000);
        }
    }, thinkingTime);
}

// --- ENGINE ---
let T_W, T_H, RADIUS;
const players = [[], [], [], []];
let lineOfPlay = [];
let turn = -1;
let isWashing = false, washTiles = [];
let isDragging = false, dragTile = null, dragIdx = -1;
let mouseX, mouseY, dragOffsetX, dragOffsetY;

function setupDimensions() {
    canvas.width = window.innerWidth * 0.95;
    canvas.height = window.innerHeight * 0.9;
    const scaleFactor = Math.min(canvas.width, canvas.height);
    T_W = scaleFactor * 0.05; T_H = T_W * 1.8; RADIUS = T_W * 0.1;
}

window.addEventListener('resize', setupDimensions);

function startWash() {
    isWashing = true; washTiles = [];
    const interval = setInterval(() => { if(Math.random() > 0.4) playClack(); }, 60);
    for(let i=0; i<28; i++) {
        washTiles.push({ x: canvas.width/2, y: canvas.height/2, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, angle: Math.random()*360 });
    }
    setTimeout(() => { 
        isWashing = false; clearInterval(interval); 
        dealDominoes(); 
    }, 2500);
}

function dealDominoes() {
    const deck = [];
    for (let i = 0; i <= 6; i++) for (let j = i; j <= 6; j++) deck.push({ t: i, b: j });
    deck.sort(() => Math.random() - 0.5);
    for (let p = 0; p < 4; p++) players[p] = deck.splice(0, 7);
    
    // NEW START LOGIC
    if (winnerOfPreviousHand === -1 || isDoublePointRound) {
        // Double Six must start
        for (let p = 0; p < 4; p++) {
            if (players[p].some(t => t.t === 6 && t.b === 6)) { 
                turn = p; 
                break; 
            }
        }
    } else {
        // Winner of previous hand starts (The Pose)
        turn = winnerOfPreviousHand;
    }

    updateUI();
    if (turn !== 0) aiMove();
}

function drawTile(x, y, t, b, angle, hidden) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle * Math.PI / 180);
    ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
    if (hidden) {
        let grad = ctx.createLinearGradient(0, -T_H/2, 0, T_H/2);
        grad.addColorStop(0, "#27ae60"); grad.addColorStop(0.35, "#27ae60");
        grad.addColorStop(0.45, "#f1c40f"); grad.addColorStop(0.55, "#f1c40f");
        grad.addColorStop(0.65, "#000000"); grad.addColorStop(1, "#000000");
        ctx.fillStyle = grad;
    } else { ctx.fillStyle = "#fff"; }
    ctx.beginPath(); ctx.roundRect(-T_W/2, -T_H/2, T_W, T_H, RADIUS); ctx.fill(); ctx.stroke();
    if (!hidden) {
        ctx.beginPath(); ctx.strokeStyle = "#444"; ctx.moveTo(-T_W/2+5, 0); ctx.lineTo(T_W/2-5, 0); ctx.stroke();
        const pips = (oy, val) => {
            const g = T_W * 0.22, r = T_W * 0.08;
            const pos = {0:[],1:[[0,0]],2:[[-g,-g],[g,g]],3:[[-g,-g],[0,0],[g,g]],4:[[-g,-g],[g,-g],[-g,g],[g,g]],5:[[-g,-g],[g,-g],[0,0],[-g,g],[g,g]],6:[[-g,-g],[g,-g],[-g,0],[g,0],[-g,g],[g,g]]};
            ctx.fillStyle = "#222"; pos[val].forEach(p => { ctx.beginPath(); ctx.arc(p[0], oy + p[1], r, 0, Math.PI*2); ctx.fill(); });
        };
        pips(-T_H/4, b); pips(T_H/4, t);
    }
    ctx.restore();
}

function tryPlay(tile, mouseXPos) {
    let played = false;
    if (lineOfPlay.length === 0) {
        // If it's a Double Six start round
        if (winnerOfPreviousHand === -1 || isDoublePointRound) {
            if (tile.t === 6 && tile.b === 6) { lineOfPlay.push({ t: 6, b: 6, angle: 0 }); played = true; }
        } else {
            // "The Pose" - can play anything
            lineOfPlay.push({ t: tile.t, b: tile.b, angle: 0 }); played = true;
        }
    } else {
        const L = lineOfPlay[0].t, R = lineOfPlay[lineOfPlay.length - 1].b;
        if (mouseXPos < canvas.width / 2) {
            if (tile.b === L) { lineOfPlay.unshift({ t: tile.t, b: tile.b }); played = true; }
            else if (tile.t === L) { lineOfPlay.unshift({ t: tile.b, b: tile.t }); played = true; }
        } else {
            if (tile.t === R) { lineOfPlay.push({ t: tile.t, b: tile.b }); played = true; }
            else if (tile.b === R) { lineOfPlay.push({ t: tile.b, b: tile.t }); played = true; }
        }
    }
    if (played) { playClack(); passCount = 0; if (tile.t === tile.b) triggerShake(20); }
    return played;
}

function checkWin() {
    for (let i = 0; i < 4; i++) {
        if (players[i].length === 0) {
            processWinner(i, `PLAYER ${i === 0 ? 'LION' : i + 1} WINS THE HAND!`);
            return true;
        }
    }
    return false;
}

function handleLockedGame() {
    let totals = players.map(hand => hand.reduce((sum, tile) => sum + tile.t + tile.b, 0));
    let minScore = Math.min(...totals);
    
    // Check if there is a draw (multiple players with same minScore)
    let winners = [];
    totals.forEach((s, i) => { if(s === minScore) winners.push(i); });

    if (winners.length > 1) {
        // IT'S A DRAW!
        isDoublePointRound = true;
        statusMsg.innerText = "DRAW GAME! Next round Double 6 starts for 2 points!";
        triggerShake(30);
        setTimeout(() => {
            alert("DRAW! No points awarded. Next game is worth 2 points and Double 6 must start.");
            resetHand();
        }, 2000);
    } else {
        let winnerIdx = winners[0];
        processWinner(winnerIdx, `GAME LOCKED! PLAYER ${winnerIdx === 0 ? 'LION' : winnerIdx + 1} HAS THE LOWEST COUNT (${minScore})!`);
    }
}

function handlePass() { 
    if (lineOfPlay.length > 0) {
        boardHistory.push({p: 0, val: lineOfPlay[0].t}, {p: 0, val: lineOfPlay[lineOfPlay.length-1].b});
    }
    speakPass(); passCount++; if (passCount >= 4) handleLockedGame(); else nextTurn(); 
}

function nextTurn() { turn = (turn + 1) % 4; updateUI(); if (turn !== 0) aiMove(); }

function updateUI() {
    statusMsg.innerText = (turn === 0) ? "Your Move, Lion" : `Player ${turn + 1} Thinking... (${difficulty})`;
    const L = lineOfPlay[0]?.t, R = lineOfPlay[lineOfPlay.length - 1]?.b;
    
    let canPlay = false;
    if (lineOfPlay.length === 0) {
        if (winnerOfPreviousHand === -1 || isDoublePointRound) {
            canPlay = players[0].some(t => t.t === 6 && t.b === 6);
        } else {
            canPlay = true; // Winner can play anything to start
        }
    } else {
        canPlay = players[0].some(t => t.t === L || t.b === L || t.t === R || t.b === R);
    }
    
    passBtn.style.display = (turn === 0 && !canPlay) ? 'block' : 'none';
}

function updateScoreboardUI() {
    scoreBoard.style.display = 'block';
    let doubleText = isDoublePointRound ? " <span style='color:red'>(2 PTS ROUND)</span>" : "";
    
    if (gameMode === "Cut Throat") {
        scoreBoard.innerHTML = `<div style="color:var(--rasta-gold); font-size:0.8vw; margin-bottom:10px;">CUT THROAT - ${difficulty}${doubleText}</div>` +
            scores.map((s, i) => `<div class="score-item">${i===0?'YOU':'P'+(i+1)} <span class="score-val">${s}</span></div>`).join('');
    } else {
        const team1 = scores[0] + scores[2];
        const team2 = scores[1] + scores[3];
        scoreBoard.innerHTML = `<div style="color:var(--rasta-gold); font-size:0.8vw; margin-bottom:10px;">PARTNER - ${difficulty}${doubleText}</div>
            <div class="score-item" style="color:var(--rasta-green)">LIONS (1&3)<span class="score-val">${team1}</span></div>
            <div class="score-item" style="color:var(--rasta-red)">OPPS (2&4)<span class="score-val">${team2}</span></div>`;
    }
}

function playClack() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function speakPass() {
    const msg = new SpeechSynthesisUtterance("Jah... me pass");
    msg.rate = 0.8; window.speechSynthesis.speak(msg);
}

function gameLoop() {
    ctx.save();
    if (shakeAmount > 0) {
        ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        shakeAmount *= 0.9;
    }
    ctx.clearRect(-100, -100, canvas.width + 200, canvas.height + 200);
    const cx = canvas.width / 2, cy = canvas.height / 2;
    
    if (isSlamming) {
        scatterTiles.forEach(t => {
            t.x += (t.targetX - t.x) * 0.15; t.y += (t.targetY - t.y) * 0.15;
            drawTile(t.x, t.y, t.t, t.b, t.angle, t.hidden);
        });
        if (slamHand.opacity > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${slamHand.opacity * 0.5})`;
            ctx.beginPath(); ctx.arc(slamHand.x, slamHand.y, T_W * slamHand.scale, 0, Math.PI*2); ctx.fill();
            slamHand.scale += 0.2; slamHand.opacity *= 0.92;
        }
    } else if (isWashing) {
        washTiles.forEach(t => { 
            t.x += t.vx; t.y += t.vy; 
            if (t.x < 50 || t.x > canvas.width - 50) t.vx *= -1; 
            if (t.y < 50 || t.y > canvas.height - 50) t.vy *= -1; 
            drawTile(t.x, t.y, 0, 0, t.angle, true); 
        });
    } else if (turn !== -1) {
        if (lineOfPlay.length > 0) {
            let totalW = 0; lineOfPlay.forEach(t => totalW += (t.t === t.b ? T_W : T_H) + 4);
            let drawX = cx - (totalW / 2);
            lineOfPlay.forEach((t) => {
                const isDouble = t.t === t.b;
                const w = isDouble ? T_W : T_H;
                drawTile(drawX + w/2, cy, t.t, t.b, isDouble ? 0 : 90, false);
                drawX += w + 4;
            });
        }
        for (let p = 1; p < 4; p++) players[p].forEach((_, i) => {
            let x, y, ang;
            if (p === 1) { x = 40; y = cy - 100 + i * 28; ang = 90; }
            if (p === 2) { x = cx - 100 + i * 28; y = 40; ang = 0; }
            if (p === 3) { x = canvas.width - 40; y = cy - 100 + i * 28; ang = 90; }
            drawTile(x, y, 0, 0, ang, true);
        });
        players[0].forEach((t, i) => { 
            if (isDragging && dragIdx === i) return; 
            const x = cx - (players[0].length * T_W * 1.2) / 2 + i * T_W * 1.2; 
            const y = canvas.height - T_H * 0.7; 
            drawTile(x, y, t.t, t.b, 0, false); 
        });
        if (isDragging && dragTile) drawTile(mouseX + dragOffsetX, mouseY + dragOffsetY, dragTile.t, dragTile.b, 0, false);
    }
    ctx.restore();
    requestAnimationFrame(gameLoop);
}

canvas.addEventListener('mousedown', e => {
    if (turn !== 0 || isWashing || isSlamming) return;
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
    players[0].forEach((t, i) => {
        const x = canvas.width/2 - (players[0].length * T_W * 1.2) / 2 + i * T_W * 1.2;
        const y = canvas.height - T_H * 0.7;
        if (Math.abs(mouseX - x) < T_W / 2 && Math.abs(mouseY - y) < T_H / 2) {
            isDragging = true; dragTile = t; dragIdx = i; dragOffsetX = x - mouseX; dragOffsetY = y - mouseY;
        }
    });
});
window.addEventListener('mousemove', e => { if (isDragging) { const rect = canvas.getBoundingClientRect(); mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top; } });
window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    if (mouseY < canvas.height - T_H * 1.5) {
         if (tryPlay(dragTile, mouseX)) { players[0].splice(dragIdx, 1); if (!checkWin()) nextTurn(); }
    }
    isDragging = false; dragTile = null;
});

setupDimensions();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
